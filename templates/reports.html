{% extends 'base.html' %}

{% block content %}
<div class="p-4 p-lg-5 max-w-1600 mx-auto">
    <div class="d-flex justify-content-between align-items-end mb-5">
        <div>
            <span class="fw-bold text-uppercase tracking-widest text-muted" style="font-size: 11px;">System Tooling</span>
            <h1 class="display-4 font-headline fw-bolder tracking-tighter mb-0">Export Configuration</h1>
        </div>
        <span class="badge bg-light text-muted border px-3 py-2 rounded-pill fw-medium d-flex align-items-center gap-2">
            <span class="rounded-circle bg-primary" style="width: 8px; height: 8px;"></span> Last sync: 4 minutes ago
        </span>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm p-4 p-lg-5 position-relative overflow-hidden h-100">
                <i data-lucide="file-text" class="position-absolute opacity-5" style="width: 150px; height: 150px; right: -20px; top: -20px;"></i>
                
                <div class="row g-5 position-relative z-1">
                    <div class="col-md-6">
                        <label class="fw-bold text-uppercase tracking-wider text-muted mb-3" style="font-size: 12px;">Temporal Range</label>
                        <div class="d-flex gap-2 mb-3">
                            <input type="date" class="form-control bg-light border-0 p-3" value="2023-10-01">
                            <input type="date" class="form-control bg-light border-0 p-3" value="2023-10-31">
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-light flex-grow-1 fw-bold" style="font-size: 12px;">7 Days</button>
                            <button class="btn btn-light flex-grow-1 fw-bold" style="font-size: 12px;">30 Days</button>
                            <button class="btn btn-primary flex-grow-1 text-white fw-bold" style="font-size: 12px;">Custom</button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold text-uppercase tracking-wider text-muted mb-3" style="font-size: 12px;">Data Granularity</label>
                        <div class="d-flex flex-column gap-2">
                            <label class="bg-light p-3 rounded d-flex justify-content-between align-items-center cursor-pointer">
                                <span class="fw-medium text-muted" style="font-size: 14px;"><i data-lucide="clock" class="me-2 d-inline" style="width:16px;"></i> Hourly Increments</span>
                                <input type="radio" name="gran" class="form-check-input">
                            </label>
                            <label class="bg-white border border-primary border-opacity-25 p-3 rounded d-flex justify-content-between align-items-center cursor-pointer shadow-sm">
                                <span class="fw-bold text-primary" style="font-size: 14px;"><i data-lucide="calendar" class="me-2 d-inline" style="width:16px;"></i> Daily Aggregation</span>
                                <input type="radio" name="gran" class="form-check-input" checked>
                            </label>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="fw-bold text-uppercase tracking-wider text-muted mb-3" style="font-size: 12px;">Metric Dimensions</label>
                        <div class="row g-3">
                            <div class="col-md-3 col-6"><label class="bg-light p-3 rounded d-flex align-items-center gap-2 cursor-pointer w-100"><input type="checkbox" class="form-check-input mt-0" checked> <span class="fw-medium text-sm">Footfall</span></label></div>
                            <div class="col-md-3 col-6"><label class="bg-light p-3 rounded d-flex align-items-center gap-2 cursor-pointer w-100"><input type="checkbox" class="form-check-input mt-0" checked> <span class="fw-medium text-sm">Dwell Time</span></label></div>
                            <div class="col-md-3 col-6"><label class="bg-light p-3 rounded d-flex align-items-center gap-2 cursor-pointer w-100"><input type="checkbox" class="form-check-input mt-0"> <span class="fw-medium text-sm">Conversion</span></label></div>
                            <div class="col-md-3 col-6"><label class="bg-light p-3 rounded d-flex align-items-center gap-2 cursor-pointer w-100"><input type="checkbox" class="form-check-input mt-0"> <span class="fw-medium text-sm">Heatmaps</span></label></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm h-100 p-4 p-lg-5 d-flex flex-column justify-content-between">
                <div>
                    <label class="fw-bold text-uppercase tracking-wider text-muted mb-4" style="font-size: 12px;">Output Format</label>
                    <div class="d-flex flex-column gap-3">
                        <div data-format="pdf" class="format-card border border-primary bg-primary bg-opacity-10 p-3 rounded d-flex align-items-center gap-3 cursor-pointer">
                            <div class="bg-primary text-white rounded p-2"><i data-lucide="file-text"></i></div>
                            <div>
                                <h6 class="mb-0 fw-bold">PDF Document</h6>
                                <small class="text-muted" style="font-size: 11px;">Visual charts & summary</small>
                            </div>
                        </div>
                        <div data-format="xlsx" class="format-card border border-opacity-25 p-3 rounded d-flex align-items-center gap-3 cursor-pointer">
                            <div class="bg-success text-white rounded p-2"><i data-lucide="table"></i></div>
                            <div>
                                <h6 class="mb-0 fw-bold">Excel (XLSX)</h6>
                                <small class="text-muted" style="font-size: 11px;">Multi-sheet raw data structure</small>
                            </div>
                        </div>
                        <div data-format="csv" class="format-card border border-opacity-25 p-3 rounded d-flex align-items-center gap-3 cursor-pointer">
                            <div class="bg-secondary text-white rounded p-2"><i data-lucide="file-code"></i></div>
                            <div>
                                <h6 class="mb-0 fw-bold">Raw CSV</h6>
                                <small class="text-muted" style="font-size: 11px;">Lightweight flat data</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div>
                    <button id="generate-report-btn" class="btn btn-primary w-100 py-3 mt-4 fw-bold text-uppercase tracking-widest d-flex align-items-center justify-content-center gap-2 text-white shadow-sm">
                        <i data-lucide="download"></i> Generate Report
                    </button>
                    <p class="text-center text-muted mt-2 mb-0 fw-bold text-uppercase" style="font-size: 10px;">Est. File Size: ~14.2 MB</p>
                </div>
            </div>
        </div>

        <div class="col-12 mt-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="font-headline fw-bold">Export History</h4>
                <button class="btn btn-link text-primary fw-bold text-uppercase p-0" style="font-size: 12px; text-decoration: none;">Clear History</button>
            </div>
            </div>
    </div>
</div>
{% endblock %}
